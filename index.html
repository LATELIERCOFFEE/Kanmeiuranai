<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#17120d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="還命占い">
<title>還命占い</title>
<style>
*{box-sizing:border-box}body{margin:0;padding:16px;background:#0d0b09;color:#f8ead1;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif}.wrap{max-width:780px;margin:0 auto}.box{background:#1b1510;border:1px solid #594229;border-radius:20px;padding:16px;margin:14px 0}h1{margin:0 0 8px;font-size:28px}h2{font-size:18px;color:#e5bd72;margin:0 0 10px}.muted{color:#ccb58f;line-height:1.6;font-size:14px}label{display:block;color:#ccb58f;font-size:13px;margin-top:10px;margin-bottom:5px}input{width:100%;font-size:17px;padding:13px;border-radius:12px;border:1px solid #594229;background:#100d0a;color:#f8ead1}button{width:100%;font-size:18px;font-weight:700;padding:15px;border-radius:14px;border:0;background:#d9aa5d;color:#160f08;margin-top:14px}.ok{color:#bfe6b9}.err{display:none;background:#351512;color:#ffd2c8;border:1px solid #84433a;border-radius:12px;padding:12px;line-height:1.6;margin-top:12px}.result{display:none}.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}@media(max-width:680px){.grid{grid-template-columns:1fr 1fr}}.card{background:#261d15;border:1px solid #594229;border-radius:16px;padding:12px}.card b{display:block;color:#d9aa5d}.card strong{font-size:32px}.pill{display:inline-block;border:1px solid #594229;background:#100d0a;border-radius:999px;padding:7px 10px;margin:4px;line-height:1.4}.read{line-height:1.85}.copy{white-space:pre-wrap;line-height:1.7;background:#100d0a;border:1px dashed #594229;border-radius:14px;padding:12px}.footer{text-align:center;color:#9f8a6a;font-size:12px;margin:24px 0}
</style>
</head>
<body>
<div class="wrap">
 <div class="box">
  <h1>還命占い</h1>
  <p class="muted">生年月日から A〜c・陰陽・五行・臓腑・無縁数・日の数・ライフパス・年運を計算します。</p>
  <p id="status" class="muted">v5 読み込み中…</p>
 </div>
 <div class="box">
  <label>名前</label>
  <input id="name" type="text" placeholder="例：みき">
  <label>生年月日</label>
  <input id="birth" type="text" placeholder="例：1988-08-28 / 1988/8/28 / 19880828">
  <label>対象年</label>
  <input id="year" type="text" placeholder="例：2026">
  <button type="button" onclick="doKanmei();">鑑定する</button>
  <div id="error" class="err"></div>
  <p class="muted">※このv5は、ボタンで進まない問題を避けるため、いちばん単純な方式で作り直した版です。</p>
 </div>
 <div id="result" class="result">
  <div class="box"><h2>計算結果</h2><div id="nums" class="grid"></div></div>
  <div class="box"><h2>陰陽</h2><div id="yinyang"></div></div>
  <div class="box"><h2>五行・臓腑</h2><div id="organs"></div></div>
  <div class="box"><h2>無縁数</h2><div id="muen"></div></div>
  <div class="box"><h2>日の数・数秘・年運</h2><div id="extras"></div></div>
  <div class="box"><h2>総合読み解き</h2><div id="reading" class="read"></div></div>
  <div class="box"><h2>コピー用まとめ</h2><div id="copy" class="copy"></div></div>
 </div>
 <div class="footer">Kanmei Uranai / v5</div>
</div>
<script>
var ORG={1:['膀胱','水','排出・柔軟性'],2:['心','火','喜び・交流・温かさ'],3:['肝','木','計画性・伸びる力'],4:['肺','金','秩序・手放し'],5:['脾','土','思考・支える力'],6:['腎','水','持久力・生命力'],7:['小腸','火','選別力・判断力'],8:['胆','木','決断・勇気'],9:['大腸','金','整理・切り替え']};
var POS={A:'天',B:'人',C:'地',a:'天',b:'人',c:'地'};
var LP={1:'始まり・自立・切り拓く力',2:'調和・共感・支える力',3:'表現・創造・楽しむ力',4:'安定・秩序・積み重ね',5:'変化・自由・冒険',6:'愛・責任・育む力',7:'探求・内省・本質を見る力',8:'達成・現実化・動かす力',9:'完成・奉仕・大きな愛'};
function el(id){return document.getElementById(id);}
function root(n){n=Math.abs(parseInt(n,10)||0);while(n>9){var t=String(n),s=0,i;for(i=0;i<t.length;i++){s+=parseInt(t.charAt(i),10)||0;}n=s;}if(n===0){return 9;}return n;}
function digitSum(s){s=String(s).replace(/[^0-9]/g,'');var sum=0,i;for(i=0;i<s.length;i++){sum+=parseInt(s.charAt(i),10)||0;}return sum;}
function parseBirth(v){var raw=String(v||'').trim();var nums=raw.replace(/[^0-9]/g,'');var yy,mm,dd,m;if(nums.length===8){yy=parseInt(nums.substr(0,4),10);mm=parseInt(nums.substr(4,2),10);dd=parseInt(nums.substr(6,2),10);}else{m=raw.match(/^(\d{4})\D+(\d{1,2})\D+(\d{1,2})$/);if(!m){return null;}yy=parseInt(m[1],10);mm=parseInt(m[2],10);dd=parseInt(m[3],10);}if(!yy||!mm||!dd||mm<1||mm>12||dd<1||dd>31){return null;}var d=new Date(yy,mm-1,dd);if(d.getFullYear()!==yy||d.getMonth()!==mm-1||d.getDate()!==dd){return null;}return {yy:yy,mm:mm,dd:dd};}
function contains(arr,n){var i;for(i=0;i<arr.length;i++){if(arr[i]===n){return true;}}return false;}
function avoid(candidate,used){var r=root(candidate);if(!contains(used,r)){return r;}var arr=used.slice(0);arr.push(r);arr.sort(function(a,b){return b-a;});var tries=[];if(arr.length>=2){tries.push(Math.abs(arr[0]-arr[1]));}if(arr.length>=3){tries.push(Math.abs(arr[1]-arr[2]));tries.push(Math.abs(arr[0]-arr[2]));}tries.push(r+1);tries.push(r+2);tries.push(r+3);tries.push(r+4);var i,x;for(i=0;i<tries.length;i++){x=root(tries[i]);if(x && !contains(used,x)){return x;}}for(i=1;i<=9;i++){if(!contains(used,i)){return i;}}return r;}
function calc(b,year){var A=root(b.dd);var B=root(b.mm);if(B===A){B=root(B*2);}var used=[A,B];var C=avoid(A+B,used);used.push(C);var a;if(contains(used,9)){a=1;if(contains(used,a)){a=avoid(a,used);}}else{a=avoid(A+C,used);}used.push(a);var bb=avoid(A+a,used);used.push(bb);var c=avoid(A+bb,used);used.push(c);var vals={A:A,B:B,C:C,a:a,b:bb,c:c};var all=[A,B,C,a,bb,c];var muen=[],i;for(i=1;i<=9;i++){if(!contains(all,i)){muen.push(i);}}var dayNum=root(digitSum(String(b.mm)+String(b.dd)));var life=root(digitSum(String(b.yy)+String(b.mm)+String(b.dd)));var kazoe=year-b.yy+1;var nen=root(kazoe);return {vals:vals,all:all,muen:muen,dayNum:dayNum,life:life,kazoe:kazoe,nen:nen};}
function pill(s){return '<span class="pill">'+s+'</span>';}
function showError(msg){el('error').style.display='block';el('error').innerHTML=msg;}
function clearError(){el('error').style.display='none';el('error').innerHTML='';}
function doKanmei(){try{clearError();var name=el('name').value||'対象者';var b=parseBirth(el('birth').value);var year=parseInt(el('year').value,10)||new Date().getFullYear();if(!b){showError('生年月日を確認してね。例：1988-08-28 / 1988/8/28 / 19880828');return false;}if(year<b.yy){showError('対象年が生まれ年より前になっているみたい。');return false;}var r=calc(b,year);var keys=['A','B','C','a','b','c'];var html='',i,k,v;for(i=0;i<keys.length;i++){k=keys[i];v=r.vals[k];html+='<div class="card"><b>'+k+'（'+POS[k]+'）</b><strong>'+v+'</strong><span>'+(v%2?'陽':'陰')+'・'+ORG[v][1]+'・'+ORG[v][0]+'</span></div>';}el('nums').innerHTML=html;var yang=0;for(i=0;i<r.all.length;i++){if(r.all[i]%2===1){yang++;}}var yin=6-yang;var balance='';if(yang>yin){balance='陽多め。外へ出す力、動かす力が出やすい流れ。';}else if(yin>yang){balance='陰多め。内側で熟成し、受け止める力が出やすい流れ。';}else{balance='陽陰の行き来がしやすいバランス型。';}el('yinyang').innerHTML=pill('陽 '+yang)+pill('陰 '+yin)+'<p class="read">'+balance+'</p>';html='';for(i=0;i<keys.length;i++){k=keys[i];v=r.vals[k];html+=pill(k+'：'+v+'（'+ORG[v][1]+'・'+ORG[v][0]+'／'+ORG[v][2]+'）');}el('organs').innerHTML=html;html='';if(r.muen.length>0){for(i=0;i<r.muen.length;i++){v=r.muen[i];html+=pill(v+'：'+ORG[v][1]+'・'+ORG[v][0]);}html+='<p class="read">無縁数は欠点ではなく、「誰にも縛られない空き地」。外から強要されると疲れやすいけれど、自分から育てたいと思ったときには自由に触れられる余白です。</p>';}else{html='<p class="read">1〜9がすべて巡っている、欠けの少ない構造です。</p>';}el('muen').innerHTML=html;el('extras').innerHTML=pill('日の数：'+r.dayNum+'（'+LP[r.dayNum]+'）')+pill('ライフパス：'+r.life+'（'+LP[r.life]+'）')+pill(year+'年の数え年：'+r.kazoe)+pill('年運：'+r.nen+'（'+LP[r.nen]+'）');var counts={},top='',topCount=0,e;for(i=0;i<r.all.length;i++){e=ORG[r.all[i]][1];counts[e]=(counts[e]||0)+1;if(counts[e]>topCount){top=e;topCount=counts[e];}}el('reading').innerHTML=name+'さんは、'+top+'の気配が強めに出る人。<br>天・人・地の数字を見ると、考え方、つながり方、現実の動かし方にそれぞれ違う色が灯っています。<br><br>'+year+'年の年運は'+r.nen+'。「'+LP[r.nen]+'」がテーマ。持っている数字は自然に使い、無縁の数字は“育てたくなった時に触れる余白”として扱うと、還命占いらしいやさしい読みになります。';var lines=[];lines.push('【計算結果】');for(i=0;i<keys.length;i++){k=keys[i];lines.push(k+'：'+r.vals[k]+'（'+POS[k]+'）');}lines.push('');lines.push('【陰陽】');lines.push('陽'+yang+'／陰'+yin);lines.push('');lines.push('【五行・臓腑】');for(i=0;i<keys.length;i++){k=keys[i];v=r.vals[k];lines.push(k+'：'+v+'（'+ORG[v][1]+'・'+ORG[v][0]+'）');}lines.push('');lines.push('【無縁数】');lines.push(r.muen.join('・')||'なし');lines.push('');lines.push('【数秘】');lines.push('ライフパス：'+r.life+'（'+LP[r.life]+'）');lines.push('日の数：'+r.dayNum+'（'+LP[r.dayNum]+'）');lines.push('');lines.push('【年運】');lines.push(year+'年：年運'+r.nen+'（'+LP[r.nen]+'）');el('copy').textContent=lines.join('\n');el('result').style.display='block';location.hash='result';return false;}catch(ex){showError('内部エラー：'+(ex && ex.message ? ex.message : ex));return false;}}
window.onload=function(){el('year').value=(new Date()).getFullYear();el('status').innerHTML='<span class="ok">v5 読み込みOK</span>';el('birth').onkeydown=function(ev){ev=ev||window.event;if(ev.keyCode===13){doKanmei();return false;}};};
</script>
</body>
</html>
